version: '3.8'

services:
  # 1. The API Server
  backend:
    build: ./backend
    container_name: manhwa_backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      # Celery can use Redis as both broker and result backend, so local
      # dev doesn't need a separate RabbitMQ container.
      - RABBITMQ_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  # 2. The Worker
  worker:
    build: ./backend
    container_name: manhwa_worker
    env_file:
      - ./backend/.env
    environment:
      - RABBITMQ_URL=redis://redis:6379/0
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1

  # 3. The Broker
  redis:
    image: "redis:alpine"
    container_name: manhwa_redis
    ports:
      - "6379:6379"